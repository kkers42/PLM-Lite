name: Build Windows Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[test]"

      - name: Run tests
        run: pytest

      - name: Build CLI executable (plmlite.exe)
        run: >
          pyinstaller
          --onefile
          --name plmlite
          --console
          --collect-submodules watchdog
          --collect-submodules plmlite
          --add-data "schema.sql;."
          cli_entry.py

      - name: Build GUI executable (plmlite-gui.exe)
        run: >
          pyinstaller
          --onefile
          --name plmlite-gui
          --windowed
          --collect-submodules watchdog
          --collect-submodules plmlite
          --collect-data customtkinter
          --add-data "schema.sql;."
          gui_entry.py

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: plmlite-cli-windows
          path: dist/plmlite.exe
          retention-days: 30

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: plmlite-gui-windows
          path: dist/plmlite-gui.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/plmlite.exe
            dist/plmlite-gui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
